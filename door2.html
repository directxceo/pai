<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title> </title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <video id="vid" loop playsinline muted style="position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;pointer-events:none;">
    <source src="https://streamable.com/e/resq9v?" type="video/mp4" />
  </video>
  <script>
    const v = document.getElementById('vid');
    v.load();
    v.play().then(() => {
      v.muted = false;
    }).catch(() => {});
    document.addEventListener('click', () => {
      v.muted = false;
      v.play();
    }, { once: true });
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('dragstart', e => e.preventDefault());
  </script>
</body>
</html>
